name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.41.2'
  DENO_VERSION: '1.42.4'

jobs:
  flutter:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

  supabase:
    name: Supabase Functions Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Type Check (shared modules)
        run: deno check supabase/functions/_shared/agent_engine.ts supabase/functions/_shared/agent_planner.ts supabase/functions/_shared/evermemos_client.ts supabase/functions/_shared/guide_ai.ts supabase/functions/_shared/guide_engine.ts supabase/functions/_shared/guide_memory.ts

      - name: Test
        run: deno test --no-check --allow-env --allow-net=0.0.0.0 supabase/functions/

  backend:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Test
        run: npm test
