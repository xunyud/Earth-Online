<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth Online - V1 Forest Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #2a3a1e;
    font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
  }

  /* ── sky gradient (hand-painted feel) ── */
  .sky {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 8%, rgba(255,252,225,0.85) 0%, transparent 45%),
      radial-gradient(ellipse at 75% 20%, rgba(220,240,190,0.4) 0%, transparent 45%),
      linear-gradient(180deg, #f0eacc 0%, #e2ddb5 12%, #c4d8a0 28%, #8abf6e 48%, #5a9e4a 65%, #3d7a3a 80%, #2a5428 100%);
  }

  /* ── sun core + halo ── */
  .sun {
    position: absolute; top: -80px; left: 10%; width: 300px; height: 300px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,252,220,1) 0%, rgba(255,240,160,0.7) 25%, rgba(255,220,100,0.3) 50%, transparent 72%);
    filter: blur(1px);
    animation: sunPulse 4s ease-in-out infinite alternate;
  }
  .sun-halo {
    position: absolute; top: -200px; left: 2%; width: 620px; height: 620px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,248,200,0.35) 0%, rgba(255,235,150,0.12) 40%, transparent 65%);
    animation: sunPulse 4s ease-in-out infinite alternate;
    pointer-events: none;
  }
  .sun-flare {
    position: absolute; top: 30px; left: 16%; width: 180px; height: 180px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,240,0.5) 0%, transparent 60%);
    animation: flareDrift 5s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes sunPulse {
    0%   { transform: scale(1); opacity: 0.9; }
    100% { transform: scale(1.1); opacity: 1; }
  }
  @keyframes flareDrift {
    0%   { transform: translate(0, 0) scale(1); opacity: 0.4; }
    100% { transform: translate(20px, 10px) scale(1.15); opacity: 0.65; }
  }

  /* ── god rays (more, brighter, wider spread) ── */
  .rays {
    position: absolute; inset: 0; overflow: hidden; pointer-events: none; opacity: 0.45;
  }
  .ray {
    position: absolute; top: -10%;
    height: 135%;
    background: linear-gradient(180deg, rgba(255,250,210,0.6) 0%, rgba(255,245,180,0.2) 40%, transparent 82%);
    transform-origin: top center;
    animation: rayShimmer 5s ease-in-out infinite alternate;
  }
  .ray:nth-child(1) { left: 6%;  width: 180px; transform: rotate(10deg); animation-delay: 0s; }
  .ray:nth-child(2) { left: 14%; width: 130px; transform: rotate(16deg); animation-delay: -1.2s; opacity: 0.7; }
  .ray:nth-child(3) { left: 24%; width: 200px; transform: rotate(6deg);  animation-delay: -2.5s; opacity: 0.55; }
  .ray:nth-child(4) { left: 3%;  width: 110px; transform: rotate(22deg); animation-delay: -3.8s; opacity: 0.45; }
  .ray:nth-child(5) { left: 34%; width: 150px; transform: rotate(3deg);  animation-delay: -1s; opacity: 0.35; }
  .ray:nth-child(6) { left: 19%; width: 90px;  transform: rotate(25deg); animation-delay: -4.2s; opacity: 0.3; }
  .ray:nth-child(7) { left: 40%; width: 170px; transform: rotate(-2deg); animation-delay: -2s; opacity: 0.25; }
  @keyframes rayShimmer {
    0%   { opacity: 0.3; }
    100% { opacity: 0.7; }
  }

  /* ── warm light wash across the scene ── */
  .sunwash {
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 18% 10%, rgba(255,245,190,0.35) 0%, transparent 55%),
      radial-gradient(ellipse at 35% 30%, rgba(255,240,170,0.15) 0%, transparent 45%),
      linear-gradient(160deg, rgba(255,250,210,0.12) 0%, transparent 40%);
  }

  /* ── parallax ── */
  .parallax-wrap { position: absolute; inset: 0; overflow: hidden; }
  .parallax-layer { position: absolute; bottom: 0; left: 0; display: flex; will-change: transform; }
  .parallax-layer img { height: 100%; flex-shrink: 0; object-fit: cover; display: block; }
  .parallax-layer.sky-img  { height: 100%; opacity: 0.55; }
  .parallax-layer.far      { height: 58%; opacity: 0.65; }
  .parallax-layer.mid      { height: 52%; opacity: 0.78; }
  .parallax-layer.near     { height: 50%; opacity: 0.88; }
  .parallax-layer.sky-img img { width: 100vw; }
  .parallax-layer.far img     { width: 100vw; }
  .parallax-layer.mid img     { width: 125vw; }
  .parallax-layer.near img    { width: 156.25vw; }

  /* ── drifting mist layers ── */
  .mist {
    position: absolute; bottom: 15%; left: 0; width: 200%; height: 30%;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(220,235,210,0.35) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 40%, rgba(255,255,245,0.25) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 60%, rgba(200,230,190,0.3)  0%, transparent 50%);
    animation: mistDrift 25s linear infinite;
    pointer-events: none;
  }
  .mist.b {
    bottom: 25%; height: 20%; opacity: 0.5;
    animation-duration: 35s; animation-direction: reverse;
  }
  @keyframes mistDrift {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ── foreground grass blades (CSS generated) ── */
  .grass-wrap {
    position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
    overflow: hidden; pointer-events: none; z-index: 4;
  }
  .grass-blade {
    position: absolute; bottom: 0; width: 4px; border-radius: 2px 2px 0 0;
    transform-origin: bottom center;
    animation: grassSway 3s ease-in-out infinite alternate;
  }
  @keyframes grassSway {
    0%   { transform: rotate(-4deg); }
    100% { transform: rotate(4deg); }
  }

  /* ── floating ambient elements ── */
  .ambient-wrap {
    position: absolute; inset: 0; pointer-events: none; z-index: 3;
  }
  .amb-icon {
    position: absolute; font-size: 18px; opacity: 0;
    animation: ambFloat 12s ease-in-out infinite;
  }
  @keyframes ambFloat {
    0%   { opacity: 0; transform: translateY(20px) rotate(-5deg); }
    15%  { opacity: 0.5; }
    50%  { opacity: 0.35; transform: translateY(-40px) rotate(5deg); }
    85%  { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(20px) rotate(-5deg); }
  }

  /* ── glow orbs ── */
  .glow-wrap { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .glow-orb { position: absolute; border-radius: 50%; animation: glowDrift 6s ease-in-out infinite alternate; }
  .glow-orb.a { width: 480px; height: 480px; top: 2%; left: 10%; background: radial-gradient(circle, rgba(255,246,207,0.28), transparent 60%); }
  .glow-orb.b { width: 350px; height: 350px; bottom: 22%; right: 8%; background: radial-gradient(circle, rgba(78,199,132,0.2), transparent 60%); animation-delay: -3s; }
  .glow-orb.c { width: 250px; height: 250px; top: 45%; left: 60%; background: radial-gradient(circle, rgba(255,253,220,0.15), transparent 60%); animation-delay: -1.5s; animation-duration: 8s; }
  @keyframes glowDrift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(30px,-20px) scale(1.06); } }

  /* ── particle canvas ── */
  #particles { position: absolute; inset: 0; pointer-events: none; z-index: 5; }

  /* ── vignette ── */
  .vignette {
    position: absolute; inset: 0; pointer-events: none; z-index: 6;
    background: radial-gradient(ellipse at 50% 45%, transparent 55%, rgba(30,50,20,0.35) 100%);
  }

  /* ── login card ── */
  .login-card {
    position: absolute; z-index: 10;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 420px; max-width: 90vw;
    background: rgba(255,255,255,0.78);
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border-radius: 34px;
    border: 1.5px solid rgba(47,123,53,0.1);
    box-shadow:
      0 30px 80px rgba(20,45,20,0.22),
      0 4px 12px rgba(0,0,0,0.06),
      inset 0 1px 0 rgba(255,255,255,0.65);
    padding: 36px 32px 28px;
    animation: cardIn 0.9s cubic-bezier(0.2,0.8,0.2,1) 0.3s both;
  }
  @keyframes cardIn {
    0%   { opacity: 0; transform: translate(-50%,-46%) scale(0.94); }
    100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  }

  /* ── card vine decoration ── */
  .vine {
    position: absolute; pointer-events: none; z-index: 11;
  }
  .vine.top-left {
    top: -18px; left: -14px; font-size: 36px;
    transform: rotate(-30deg);
    animation: vineGrow 1.2s cubic-bezier(0.2,0.8,0.2,1) 0.6s both;
  }
  .vine.top-right {
    top: -14px; right: -10px; font-size: 28px;
    transform: rotate(20deg) scaleX(-1);
    animation: vineGrow 1.2s cubic-bezier(0.2,0.8,0.2,1) 0.8s both;
  }
  .vine.bot-right {
    bottom: -12px; right: 20px; font-size: 24px;
    transform: rotate(15deg);
    animation: vineGrow 1.2s cubic-bezier(0.2,0.8,0.2,1) 1.0s both;
  }
  @keyframes vineGrow {
    0%   { opacity: 0; transform: scale(0.4) rotate(var(--vr, -30deg)); }
    100% { opacity: 0.6; }
  }

  /* ── card header with gradient bg ── */
  .card-header {
    margin: -36px -32px 0; padding: 28px 28px 20px;
    border-radius: 34px 34px 0 0;
    background: linear-gradient(180deg, #FFFCF7, #F6F3E8);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .brand-row { display: flex; align-items: center; gap: 12px; }
  .brand-icon {
    width: 48px; height: 48px; border-radius: 15px; position: relative;
    background: linear-gradient(145deg, #2F8A43, #4BA556);
    box-shadow: 0 6px 20px rgba(47,138,67,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; line-height: 1;
  }
  .brand-icon .check {
    position: absolute; right: -3px; bottom: -3px;
    width: 18px; height: 18px; border-radius: 50%;
    background: #fff; border: 2px solid #2F8A43;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 900; color: #2F8A43;
  }
  .brand-title { font-size: 20px; font-weight: 900; color: #1A331F; letter-spacing: -0.5px; }

  /* language toggle */
  .lang-toggle {
    display: flex; padding: 3px; border-radius: 999px;
    background: rgba(47,138,67,0.08); gap: 2px;
  }
  .lang-btn {
    padding: 5px 12px; border-radius: 999px; border: none;
    font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    background: transparent; color: #5B8A5E;
  }
  .lang-btn.active { background: #fff; color: #2F7B35; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

  .welcome { font-size: 19px; font-weight: 800; color: #395D3E; margin-bottom: 0; }

  /* auth mode toggle */
  .auth-toggle {
    display: flex; margin: 16px 0 0; padding: 4px; border-radius: 999px;
    background: rgba(47,138,67,0.06);
  }
  .auth-btn {
    flex: 1; padding: 10px 0; border: none; border-radius: 999px;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.25s;
    background: transparent; color: #7BAF80;
  }
  .auth-btn.active {
    background: #2F8A43; color: #fff;
    box-shadow: 0 4px 14px rgba(47,138,67,0.3);
  }

  /* card body */
  .card-body { padding-top: 18px; }

  .input-row {
    display: flex; align-items: center; gap: 10px;
    padding: 13px 15px; border-radius: 18px;
    background: rgba(255,255,255,0.92);
    border: 1.5px solid rgba(47,123,53,0.1);
    margin-bottom: 10px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-row:focus-within { border-color: #2F7B35; box-shadow: 0 0 0 3px rgba(47,123,53,0.08); }
  .input-row .icon { color: #7BAF80; font-size: 16px; flex-shrink: 0; }
  .input-row input { border: none; outline: none; flex: 1; background: transparent; font-size: 14px; color: #29482E; font-weight: 500; }
  .input-row input::placeholder { color: #A3BEA5; }
  .otp-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .otp-row .input-row { flex: 1; margin-bottom: 0; }
  .send-btn {
    padding: 0 14px; border-radius: 18px; border: 1.5px solid #2F7B35;
    background: transparent; color: #2F7B35; font-size: 12.5px; font-weight: 700;
    cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .send-btn:hover { background: #2F7B35; color: #fff; }
  .info-box {
    display: flex; gap: 8px; align-items: flex-start;
    padding: 10px 12px; border-radius: 14px;
    background: rgba(47,123,53,0.04);
    margin-bottom: 14px; font-size: 12px; color: #5B8A5E; line-height: 1.5;
  }
  .info-box .icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
  .primary-btn {
    width: 100%; padding: 14px; border: none; border-radius: 22px;
    background: linear-gradient(135deg, #2F8A43, #5B9E48);
    color: #fff; font-size: 16px; font-weight: 800; cursor: pointer;
    box-shadow: 0 8px 24px rgba(47,138,67,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .primary-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 30px rgba(47,138,67,0.4); }
  .bottom-link {
    display: flex; justify-content: center; align-items: center; gap: 6px;
    margin-top: 12px; font-size: 13px; color: #5B8A5E; cursor: pointer; transition: color 0.2s;
  }
  .bottom-link:hover { color: #2F7B35; }

  /* ── custom toast ── */
  .toast-wrap {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    z-index: 9999; pointer-events: none;
  }
  .toast {
    padding: 12px 22px; border-radius: 16px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(47,138,67,0.12);
    box-shadow: 0 8px 32px rgba(20,45,20,0.15);
    font-size: 14px; font-weight: 600; color: #2a5428;
    display: flex; align-items: center; gap: 8px;
    opacity: 0; transform: translateY(-12px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: auto;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { color: #8B3A3A; border-color: rgba(180,60,60,0.15); }
  .toast .toast-icon { font-size: 16px; flex-shrink: 0; }

  /* ── send-btn disabled state ── */
  .send-btn.disabled {
    opacity: 0.5; cursor: not-allowed;
    border-color: #9BB89E; color: #9BB89E;
  }
  .send-btn.disabled:hover { background: transparent; color: #9BB89E; }
</style>
</head>
<body>

<!-- Sky gradient -->
<div class="sky"></div>

<!-- Sun system -->
<div class="sun-halo"></div>
<div class="sun"></div>
<div class="sun-flare"></div>

<!-- God rays -->
<div class="rays">
  <div class="ray"></div>
  <div class="ray"></div>
  <div class="ray"></div>
  <div class="ray"></div>
  <div class="ray"></div>
  <div class="ray"></div>
  <div class="ray"></div>
</div>

<!-- Warm light wash -->
<div class="sunwash"></div>

<!-- Parallax forest layers -->
<div class="parallax-wrap">
  <div class="parallax-layer sky-img" id="layer-sky">
    <img src="{{IMG_SKY}}" alt="">
    <img src="{{IMG_SKY}}" alt="">
  </div>
  <div class="parallax-layer far" id="layer-far">
    <img src="{{IMG_FAR}}" alt="">
    <img src="{{IMG_FAR}}" alt="">
  </div>
  <div class="parallax-layer mid" id="layer-mid">
    <img src="{{IMG_MID}}" alt="">
    <img src="{{IMG_MID}}" alt="">
  </div>
  <div class="parallax-layer near" id="layer-near">
    <img src="{{IMG_NEAR}}" alt="">
    <img src="{{IMG_NEAR}}" alt="">
  </div>
</div>

<!-- Drifting mist -->
<div class="mist"></div>
<div class="mist b"></div>

<!-- Glow orbs -->
<div class="glow-wrap">
  <div class="glow-orb a"></div>
  <div class="glow-orb b"></div>
  <div class="glow-orb c"></div>
</div>

<!-- Foreground grass -->
<div class="grass-wrap" id="grassWrap"></div>

<!-- Floating ambient icons -->
<div class="ambient-wrap" id="ambientWrap"></div>

<!-- Particles (leaves + fireflies + pollen) -->
<canvas id="particles"></canvas>

<!-- Vignette -->
<div class="vignette"></div>

<!-- Login card -->
<div class="login-card">
  <div class="vine top-left">🌿</div>
  <div class="vine top-right">🍃</div>
  <div class="vine bot-right">🌱</div>

  <div class="card-header">
    <div class="header-top">
      <div class="brand-row">
        <div class="brand-icon">🌍<div class="check">✓</div></div>
        <div class="brand-title">Earth Online</div>
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active">中文</button>
        <button class="lang-btn">English</button>
      </div>
    </div>
    <div class="welcome">欢迎来到地球Online</div>
    <div class="auth-toggle">
      <button class="auth-btn active">登录</button>
      <button class="auth-btn">注册</button>
    </div>
  </div>

  <div class="card-body">
    <div class="input-row"><span class="icon">@</span><input id="emailInput" type="email" placeholder="邮箱地址"></div>
    <div class="otp-row">
      <div class="input-row"><span class="icon">🔑</span><input id="otpInput" type="text" placeholder="6位验证码" maxlength="6"></div>
      <button id="sendOtpBtn" class="send-btn">发送验证码</button>
    </div>
    <div class="info-box"><span class="icon">📩</span><span>我们会向你的邮箱发送一个6位验证码，输入后即可登录。</span></div>
    <button id="loginBtn" class="primary-btn">继续登录</button>
    <div class="bottom-link">🧭 先去逛逛（匿名体验）</div>
  </div>
</div>

<!-- Toast 通知 -->
<div class="toast-wrap" id="toastWrap">
  <div class="toast" id="toast"><span class="toast-icon"></span><span id="toastMsg"></span></div>
</div>

<script>
/* ═══ Toast 系统 ═══ */
var _toastTimer = null;
function showToast(msg, type) {
  var toast = document.getElementById('toast');
  var icon = toast.querySelector('.toast-icon');
  var msgEl = document.getElementById('toastMsg');
  msgEl.textContent = msg;
  icon.textContent = type === 'error' ? '⚠️' : '✅';
  toast.className = 'toast' + (type === 'error' ? ' error' : '');
  // 触发 reflow 后显示
  void toast.offsetWidth;
  toast.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { toast.classList.remove('show'); }, 2500);
}

/* ═══ Generate grass blades ═══ */
(function() {
  const wrap = document.getElementById('grassWrap');
  const W = window.innerWidth;
  const greens = ['#3a7a2e','#4a8f3a','#2d6622','#5ba34a','#68b455','#3d7030'];
  for (let i = 0; i < 120; i++) {
    const b = document.createElement('div');
    b.className = 'grass-blade';
    const h = 25 + Math.random() * 50;
    b.style.cssText = `
      left: ${(i / 120) * 100 + (Math.random() - 0.5) * 1.2}%;
      height: ${h}px;
      width: ${2 + Math.random() * 3}px;
      background: linear-gradient(to top, ${greens[i % greens.length]}, ${greens[(i+2) % greens.length]}cc);
      animation-duration: ${2.5 + Math.random() * 2}s;
      animation-delay: ${-Math.random() * 3}s;
      opacity: ${0.5 + Math.random() * 0.5};
    `;
    wrap.appendChild(b);
  }
})();

/* ═══ Floating ambient icons ═══ */
(function() {
  const wrap = document.getElementById('ambientWrap');
  const icons = ['🦋','🐝','🍂','🌻','🪶','✨','🌾'];
  for (let i = 0; i < 9; i++) {
    const el = document.createElement('div');
    el.className = 'amb-icon';
    el.textContent = icons[i % icons.length];
    el.style.cssText = `
      left: ${8 + Math.random() * 84}%;
      top: ${10 + Math.random() * 70}%;
      font-size: ${14 + Math.random() * 14}px;
      animation-duration: ${8 + Math.random() * 10}s;
      animation-delay: ${-Math.random() * 12}s;
    `;
    wrap.appendChild(el);
  }
})();

/* ═══ Parallax scrolling ═══ */
const layerCfg = [
  { id: 'layer-sky',  speed: 0.08 },
  { id: 'layer-far',  speed: 0.14 },
  { id: 'layer-mid',  speed: 0.30 },
  { id: 'layer-near', speed: 0.52 },
];
const BASE_SPEED = 20;
let prevT = performance.now();

function tickParallax(now) {
  const dt = (now - prevT) / 1000;
  prevT = now;
  for (const c of layerCfg) {
    const el = document.getElementById(c.id);
    const imgW = el.querySelector('img').getBoundingClientRect().width;
    if (imgW < 10) { requestAnimationFrame(tickParallax); return; }
    let x = parseFloat(el.dataset.x || '0');
    x -= BASE_SPEED * c.speed * dt;
    if (x <= -imgW) x += imgW;
    el.dataset.x = String(x);
    el.style.transform = `translateX(${x.toFixed(2)}px)`;
  }
  requestAnimationFrame(tickParallax);
}
requestAnimationFrame(tickParallax);

/* ═══ Rich particle system ═══ */
const cvs = document.getElementById('particles');
const ctx = cvs.getContext('2d');
let W, H;
function onResize() { W = cvs.width = innerWidth; H = cvs.height = innerHeight; }
onResize();
addEventListener('resize', onResize);

const pts = [];
const leafPal = ['rgba(34,139,34,0.6)','rgba(50,205,50,0.5)','rgba(255,215,0,0.45)','rgba(152,255,152,0.45)','rgba(107,170,74,0.5)','rgba(180,120,40,0.4)'];

// 14 leaves — smaller, thinner, more transparent
for (let i = 0; i < 14; i++) {
  pts.push({
    t: 'leaf', x: Math.random(), y: Math.random() * 1.3 - 0.15,
    sz: 3 + Math.random() * 5,   // 3-8px (was 5-15)
    vy: 0.08 + Math.random() * 0.18,
    rot: Math.random() * Math.PI * 2,
    rv: (Math.random() - 0.5) * 0.04,
    col: leafPal[Math.floor(Math.random() * leafPal.length)],
    ph: Math.random() * Math.PI * 2,
    drift: 0.2 + Math.random() * 0.4,
  });
}

// 20 fireflies (warm yellow-green glow, lower half of screen)
for (let i = 0; i < 20; i++) {
  pts.push({
    t: 'firefly',
    x: Math.random(),
    y: 0.35 + Math.random() * 0.6,
    sz: 3 + Math.random() * 4,
    vx: (Math.random() - 0.5) * 0.15,
    vy: (Math.random() - 0.5) * 0.1,
    ph: Math.random() * Math.PI * 2,
    blinkSpeed: 1.5 + Math.random() * 2.5,
    col: Math.random() > 0.3 ? 'rgba(220,255,120,' : 'rgba(255,240,150,',
  });
}

// 12 pollen (tiny white dots drifting upward)
for (let i = 0; i < 12; i++) {
  pts.push({
    t: 'pollen',
    x: Math.random(),
    y: Math.random(),
    sz: 1.5 + Math.random() * 2,
    vy: -(0.05 + Math.random() * 0.1),
    vx: (Math.random() - 0.5) * 0.08,
    ph: Math.random() * Math.PI * 2,
  });
}

// 6 big soft light spots
for (let i = 0; i < 6; i++) {
  pts.push({
    t: 'glow', x: Math.random(), y: 0.1 + Math.random() * 0.6,
    sz: 22 + Math.random() * 30,
    vy: 0.03 + Math.random() * 0.04,
    col: `rgba(255,250,205,${0.06 + Math.random() * 0.08})`,
    ph: Math.random() * Math.PI * 2,
  });
}

// 25 sun dust motes (golden sparkles caught in sunbeams, top-left quadrant bias)
for (let i = 0; i < 25; i++) {
  pts.push({
    t: 'dust',
    x: Math.random() * 0.55,             // bias toward left (sun side)
    y: Math.random() * 0.65,             // bias toward top
    sz: 1 + Math.random() * 2.5,
    vx: 0.02 + Math.random() * 0.06,     // slow rightward drift
    vy: 0.03 + Math.random() * 0.08,     // slow downward
    ph: Math.random() * Math.PI * 2,
    twinkle: 2 + Math.random() * 4,      // twinkle speed
  });
}

const now = () => performance.now() / 1000;

function draw() {
  ctx.clearRect(0, 0, W, H);
  const t = now();

  for (const p of pts) {
    if (p.t === 'leaf') {
      p.y += p.vy / H;
      if (p.y > 1.15) { p.y = -0.1; p.x = Math.random(); }
      p.rot += p.rv;
      p.x += Math.sin(p.y * Math.PI * 3 + p.ph) * p.drift / W;
      if (p.x < -0.05) p.x = 1.05;
      if (p.x > 1.05) p.x = -0.05;

      ctx.save();
      ctx.translate(p.x * W, p.y * H);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.col;
      // thin pointed leaf: narrow control points
      const L = p.sz * 1.4;          // total length
      const bulge = p.sz * 0.3;      // max width (narrow)
      ctx.beginPath();
      ctx.moveTo(0, -L / 2);         // tip
      ctx.bezierCurveTo(bulge, -L * 0.15, bulge, L * 0.15, 0, L / 2);   // right curve
      ctx.bezierCurveTo(-bulge, L * 0.15, -bulge, -L * 0.15, 0, -L / 2); // left curve
      ctx.fill();
      // center vein
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 0.4;
      ctx.beginPath();
      ctx.moveTo(0, -L * 0.35);
      ctx.lineTo(0, L * 0.35);
      ctx.stroke();
      ctx.restore();

    } else if (p.t === 'firefly') {
      // gentle random wandering
      p.x += p.vx / W;
      p.y += p.vy / H;
      p.vx += (Math.random() - 0.5) * 0.01;
      p.vy += (Math.random() - 0.5) * 0.008;
      p.vx *= 0.99; p.vy *= 0.99;
      if (p.x < 0.02) p.vx += 0.02;
      if (p.x > 0.98) p.vx -= 0.02;
      if (p.y < 0.3)  p.vy += 0.01;
      if (p.y > 0.95) p.vy -= 0.01;

      const blink = 0.2 + (Math.sin(t * p.blinkSpeed + p.ph) * 0.5 + 0.5) * 0.8;
      const px = p.x * W, py = p.y * H;

      // outer glow
      ctx.save();
      ctx.globalAlpha = blink * 0.3;
      ctx.shadowColor = 'rgba(220,255,120,0.6)';
      ctx.shadowBlur = 25;
      ctx.fillStyle = p.col + '0.3)';
      ctx.beginPath();
      ctx.arc(px, py, p.sz * 3, 0, Math.PI * 2);
      ctx.fill();
      // core
      ctx.globalAlpha = blink;
      ctx.shadowBlur = 12;
      ctx.fillStyle = p.col + '0.9)';
      ctx.beginPath();
      ctx.arc(px, py, p.sz, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

    } else if (p.t === 'pollen') {
      p.y += p.vy / H;
      p.x += p.vx / W + Math.sin(t * 1.5 + p.ph) * 0.0003;
      if (p.y < -0.05) { p.y = 1.05; p.x = Math.random(); }

      const alpha = 0.3 + Math.sin(t * 2 + p.ph) * 0.2;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(255,255,245,0.8)';
      ctx.beginPath();
      ctx.arc(p.x * W, p.y * H, p.sz, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

    } else if (p.t === 'glow') {
      p.y += p.vy / H;
      if (p.y > 1.1) { p.y = -0.05; p.x = Math.random(); }
      const alpha = 0.5 + Math.sin(t * 0.8 + p.ph) * 0.4;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.shadowColor = 'rgba(255,250,205,0.4)';
      ctx.shadowBlur = 30;
      ctx.fillStyle = p.col;
      ctx.beginPath();
      ctx.arc(p.x * W, p.y * H, p.sz, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

    } else if (p.t === 'dust') {
      // golden dust motes floating in sunbeams
      p.x += p.vx / W;
      p.y += p.vy / H;
      // gentle sine wobble
      p.x += Math.sin(t * 1.2 + p.ph) * 0.0002;
      p.y += Math.cos(t * 0.9 + p.ph) * 0.0001;
      // reset when leaving view
      if (p.x > 0.7 || p.y > 0.75) {
        p.x = Math.random() * 0.3;
        p.y = Math.random() * 0.3;
      }

      const twinkle = 0.15 + (Math.sin(t * p.twinkle + p.ph) * 0.5 + 0.5) * 0.85;
      const px = p.x * W, py = p.y * H;

      ctx.save();
      // warm gold glow halo
      ctx.globalAlpha = twinkle * 0.25;
      ctx.shadowColor = 'rgba(255,230,130,0.7)';
      ctx.shadowBlur = 10;
      ctx.fillStyle = 'rgba(255,240,170,0.5)';
      ctx.beginPath();
      ctx.arc(px, py, p.sz * 3, 0, Math.PI * 2);
      ctx.fill();
      // bright core
      ctx.globalAlpha = twinkle;
      ctx.shadowBlur = 4;
      ctx.fillStyle = 'rgba(255,252,230,0.95)';
      ctx.beginPath();
      ctx.arc(px, py, p.sz, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

/* ═══ JS Bridge → Flutter (webview_windows postMessage) ═══ */
(function() {
  var authMode = 'signIn'; // 'signIn' 或 'signUp'
  var lang = 'zh';         // 'zh' 或 'en'

  function sendToFlutter(data) {
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.postMessage(JSON.stringify(data));
    }
  }

  /* ── 语言切换 ── */
  var langBtns = document.querySelectorAll('.lang-btn');
  var welcomeEl = document.querySelector('.welcome');
  var infoSpan = document.querySelector('.info-box span:last-child');
  var loginBtn = document.getElementById('loginBtn');
  var sendOtpBtn = document.getElementById('sendOtpBtn');
  var emailInput = document.getElementById('emailInput');
  var otpInput = document.getElementById('otpInput');
  var guestLink = document.querySelector('.bottom-link');

  var i18n = {
    zh: {
      welcome: '欢迎来到地球Online',
      signIn: '登录', signUp: '注册',
      email: '邮箱地址', otp: '6位验证码',
      send: '发送验证码', info: '我们会向你的邮箱发送一个6位验证码，输入后即可登录。',
      submit: '继续登录', submitReg: '注册账号',
      guest: '🧭 先去逛逛（匿名体验）',
      noEmail: '请输入邮箱地址', noOtp: '请输入6位验证码'
    },
    en: {
      welcome: 'Welcome to Earth Online',
      signIn: 'Sign In', signUp: 'Sign Up',
      email: 'Email address', otp: '6-digit code',
      send: 'Send Code', info: 'We will send a 6-digit code to your email.',
      submit: 'Continue', submitReg: 'Create Account',
      guest: '🧭 Browse as Guest',
      noEmail: 'Please enter email', noOtp: 'Please enter 6-digit code'
    }
  };

  function applyLang() {
    var t = i18n[lang];
    welcomeEl.textContent = t.welcome;
    emailInput.placeholder = t.email;
    otpInput.placeholder = t.otp;
    sendOtpBtn.textContent = t.send;
    infoSpan.textContent = t.info;
    loginBtn.textContent = authMode === 'signUp' ? t.submitReg : t.submit;
    guestLink.textContent = t.guest;
    // 更新 auth-toggle 按钮文字
    var authBtns = document.querySelectorAll('.auth-btn');
    authBtns[0].textContent = t.signIn;
    authBtns[1].textContent = t.signUp;
  }

  langBtns.forEach(function(btn, idx) {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      langBtns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      lang = idx === 0 ? 'zh' : 'en';
      applyLang();
    });
  });

  /* ── 登录/注册 Tab 切换 ── */
  var authBtns = document.querySelectorAll('.auth-btn');
  authBtns.forEach(function(btn, idx) {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      authBtns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      authMode = idx === 0 ? 'signIn' : 'signUp';
      var t = i18n[lang];
      loginBtn.textContent = authMode === 'signUp' ? t.submitReg : t.submit;
    });
  });

  /* ── 60秒倒计时 ── */
  var countdown = 0;
  var countdownTimer = null;
  var sendBtnOrigText = '';

  function startCountdown() {
    countdown = 60;
    sendBtnOrigText = sendOtpBtn.textContent;
    sendOtpBtn.classList.add('disabled');
    updateCountdownText();
    countdownTimer = setInterval(function() {
      countdown--;
      if (countdown <= 0) {
        clearInterval(countdownTimer);
        countdownTimer = null;
        sendOtpBtn.classList.remove('disabled');
        sendOtpBtn.textContent = i18n[lang].send;
      } else {
        updateCountdownText();
      }
    }, 1000);
  }

  function updateCountdownText() {
    sendOtpBtn.textContent = countdown + 's';
  }

  /* ── 继续登录/注册 ── */
  if (loginBtn) {
    loginBtn.addEventListener('click', function(e) {
      e.preventDefault();
      var t = i18n[lang];
      var email = emailInput.value.trim();
      var otp = otpInput.value.trim();
      if (!email) { showToast(t.noEmail, 'error'); return; }
      if (!otp || otp.length < 6) { showToast(t.noOtp, 'error'); return; }
      sendToFlutter({ action: 'login', email: email, otp: otp, authMode: authMode });
    });
  }

  /* ── 发送验证码（带倒计时） ── */
  if (sendOtpBtn) {
    sendOtpBtn.addEventListener('click', function(e) {
      e.preventDefault();
      if (countdown > 0) return; // 倒计时中，忽略点击
      var email = emailInput.value.trim();
      if (!email) { showToast(i18n[lang].noEmail, 'error'); return; }
      sendToFlutter({ action: 'sendOtp', email: email });
    });
  }

  /* ── 匿名体验 ── */
  if (guestLink) {
    guestLink.addEventListener('click', function(e) {
      e.preventDefault();
      sendToFlutter({ action: 'guest' });
    });
  }

  /* ── 供 Flutter 调用的全局函数 ── */
  window._onOtpSent = function(email) {
    startCountdown();
    var msg = lang === 'zh' ? '验证码已发送到 ' + email : 'Code sent to ' + email;
    showToast(msg);
  };
  window._showError = function(msg) {
    showToast(msg, 'error');
  };
})();
</script>
</body>
</html>
